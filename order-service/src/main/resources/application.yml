server:
  port: 8081   # ✅ FIXED

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:h2:mem:orderdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update   # ✅ FIXED
    show-sql: true

# ===============================
# EUREKA CONFIG
# ===============================
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  # instance:
  #   prefer-ip-address: true
  #   non-secure-port: 8081   # ✅ VERY IMPORTANT
  instance:
    hostname: order-service
management:
  endpoints:
    web:
      exposure:
        include: health
