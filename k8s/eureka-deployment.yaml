apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: ecommerce-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
      - name: eureka-server
        #image: prashasthnaik/eureka:latest
        image: prashasthnaik/eureka:__TAG__
        imagePullPolicy: Always
        ports:
        - containerPort: 8761