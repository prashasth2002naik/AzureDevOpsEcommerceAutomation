server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      # 🔍 Enables automatic service discovery (optional but good)
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:

        # ===============================
        # PRODUCT SERVICE
        # ===============================
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - RewritePath=/api/products/(?<segment>.*), /products/${segment}

        # ===============================
        # ORDER SERVICE
        # ===============================
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<segment>.*), /orders/${segment}

        # ===============================
        # USER SERVICE
        # ===============================
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /users/${segment}

      # 🌐 CORS (for frontend calls)
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

# ===============================
# EUREKA CONFIG
# ===============================
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
