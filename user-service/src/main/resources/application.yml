server:
  port: 8083

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:h2:mem:userdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update   # ✅ FIXED (NOT create-drop)
    show-sql: true

# ===============================
# EUREKA CONFIG
# ===============================
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    prefer-ip-address: true
    non-secure-port: 8083   # ✅ VERY IMPORTANT
management:
  endpoints:
    web:
      exposure:
        include: health
