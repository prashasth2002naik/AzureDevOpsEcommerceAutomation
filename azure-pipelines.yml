trigger:
- main

stages:

# ============================
# STAGE 1 : CI (Build + Test + Docker Push)
# ============================
- stage: CI
  displayName: CI - Build, Test & Push Images
  jobs:
  - job: CIJob
    displayName: CI Job
    pool:
      name: Default
      # demands:
      #   - Agent.Name -equals dev-agent-1

    steps:

    # -------- API Gateway --------
    - script: mvn test
      workingDirectory: api-gateway
      displayName: API Gateway - Test

    - task: Docker@2
      displayName: API Gateway - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/apigateway
        dockerfile: api-gateway/Dockerfile
        tags: $(Build.BuildId)

    # -------- Eureka --------
    - script: mvn test
      workingDirectory: eureka-server
      displayName: Eureka - Test

    - task: Docker@2
      displayName: Eureka - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/eureka
        dockerfile: eureka-server/Dockerfile
        tags: $(Build.BuildId)

    # -------- Frontend --------
    - script: |
        npm install
        npm test
      workingDirectory: frontend
      displayName: Frontend - Test

    - task: Docker@2
      displayName: Frontend - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/frontend
        dockerfile: frontend/Dockerfile
        tags: $(Build.BuildId)

    # -------- Order Service --------
    - script: mvn test
      workingDirectory: order-service
      displayName: Order Service - Test

    - task: Docker@2
      displayName: Order Service - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/order
        dockerfile: order-service/Dockerfile
        tags: $(Build.BuildId)

    # -------- Product Service --------
    - script: mvn test
      workingDirectory: product-service
      displayName: Product Service - Test

    - task: Docker@2
      displayName: Product Service - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/product
        dockerfile: product-service/Dockerfile
        tags: $(Build.BuildId)

    # -------- User Service --------
    - script: mvn test
      workingDirectory: user-service
      displayName: User Service - Test

    - task: Docker@2
      displayName: User Service - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/user
        dockerfile: user-service/Dockerfile
        tags: $(Build.BuildId)

# # ============================
# # STAGE 2 : DEV (Agent Pool)
# # ============================
# - stage: DEV
#   displayName: CD - Dev
#   dependsOn: CI
#   condition: succeeded()

#   jobs:
#   - job: DeployDev
#     displayName: Deploy to DEV
#     pool:
#       name: Default
#       demands:
#         - ENV -equals DEV

#     steps:
#     - script: echo "Deploying images to DEV"
#       displayName: DEV Deploy
# ============================
# STAGE : DEV
# ============================
- stage: DEV
  displayName: CD - Dev
  dependsOn: CI
  condition: succeeded()

  jobs:
  - job: DeployDev
    displayName: Deploy to DEV
    pool:
      name: Default
      demands:
        - ENV -equals DEV

    steps:

    # ----------------------------
    # 1️⃣ Pre-deployment safety checks
    # ----------------------------

    - script: |
        echo "Validating docker-compose file..."
        docker-compose config
      displayName: Validate docker-compose.yml

    - script: |
        echo "Checking Docker daemon availability..."
        docker info
      displayName: Check Docker daemon

    # ----------------------------
    # 2️⃣ Controlled deployment actions
    # ----------------------------

    - script: |
        echo "Pulling latest images..."
        docker-compose pull
      displayName: Pull latest Docker images

    - script: |
        echo "Starting containers cleanly..."
        docker-compose up -d --remove-orphans
      displayName: Deploy containers (clean)

    - script: |
        echo "Verifying container status..."
        docker-compose ps
      displayName: Verify running containers

# ============================
# STAGE 3 : TEST (Agent Pool)
# ============================
- stage: TEST
  displayName: CD - Test
  dependsOn: DEV
  condition: succeeded()

  jobs:
  - job: DeployTest
    displayName: Deploy to TEST
    pool:
      name: Default
      demands:
        - ENV -equals TEST

    steps:
    - script: echo "Deploying images to TEST"
      displayName: TEST Deploy

