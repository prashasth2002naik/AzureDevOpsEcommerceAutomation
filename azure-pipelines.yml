trigger:
- main

stages:

# ============================
# STAGE 1 : CI (Build + Test + Docker Push)
# ============================
- stage: CI
  displayName: CI - Build, Test & Push Images
  jobs:
  - job: CIJob
    displayName: CI Job
    pool:
      name: Default
      # demands:
      #   - Agent.Name -equals dev-agent-1

    steps:

    # -------- API Gateway --------
    - script: mvn test
      workingDirectory: api-gateway
      displayName: API Gateway - Test

    - task: Docker@2
      displayName: API Gateway - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/apigateway
        dockerfile: api-gateway/Dockerfile
        tags: $(Build.BuildId)

    # -------- Eureka --------
    - script: mvn test
      workingDirectory: eureka-server
      displayName: Eureka - Test

    - task: Docker@2
      displayName: Eureka - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/eureka
        dockerfile: eureka-server/Dockerfile
        tags: $(Build.BuildId)

    # -------- Frontend --------
    - script: |
        npm install
        npm test
      workingDirectory: frontend
      displayName: Frontend - Test

    - task: Docker@2
      displayName: Frontend - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/frontend
        dockerfile: frontend/Dockerfile
        tags: $(Build.BuildId)

    # -------- Order Service --------
    - script: mvn test
      workingDirectory: order-service
      displayName: Order Service - Test

    - task: Docker@2
      displayName: Order Service - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/order
        dockerfile: order-service/Dockerfile
        tags: $(Build.BuildId)

    # -------- Product Service --------
    - script: mvn test
      workingDirectory: product-service
      displayName: Product Service - Test

    - task: Docker@2
      displayName: Product Service - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/product
        dockerfile: product-service/Dockerfile
        tags: $(Build.BuildId)

    # -------- User Service --------
    - script: mvn test
      workingDirectory: user-service
      displayName: User Service - Test

    - task: Docker@2
      displayName: User Service - Build & Push
      inputs:
        command: buildAndPush
        containerRegistry: dockerhub
        repository: prashasthnaik/user
        dockerfile: user-service/Dockerfile
        tags: $(Build.BuildId)

# ============================
# STAGE 2 : DEV (Deploy + Smoke Tests)
# ============================
- stage: DEV
  displayName: CD - Dev (Deploy + Smoke Tests)
  dependsOn: CI
  condition: succeeded()

  jobs:
  - job: DeployDev
    displayName: Deploy to DEV
    pool:
      name: Default
      demands:
        - ENV -equals DEV

    steps:

    # Validate docker-compose file
    - script: |
        echo "Validating docker-compose.yml"
        docker compose config
      displayName: Validate docker-compose

    # Pull latest images
    - script: |
        echo "Pulling images"
        docker compose pull
      displayName: Pull images

    # Deploy containers
    - script: |
        echo "Deploying containers"
        docker compose up -d --remove-orphans
      displayName: Deploy containers

    # Wait for services to start
    - script: |
        echo "Waiting for services to start"
        sleep 40
      displayName: Wait for startup

    # --------------------
    # SMOKE TESTS (ROUTE-BASED)
    # --------------------

    # API Gateway smoke test via real route
    - script: |
        echo "Smoke Test: API Gateway → Order Service"
        curl -f http://localhost:8080/order
      displayName: Smoke Test - Gateway Route

    # Frontend smoke test
    - script: |
        echo "Smoke Test: Frontend"
        curl -f http://localhost:3000
      displayName: Smoke Test - Frontend

    # --------------------
    # SMOKE TESTS
    # --------------------

    # API Gateway smoke test
    - script: |
        echo "Smoke test: API Gateway"
        curl -f http://localhost:8080
      displayName: Smoke Test - API Gateway

    # Eureka smoke test
    - script: |
        echo "Smoke test: Eureka"
        curl -f http://localhost:8761
      displayName: Smoke Test - Eureka

    # Frontend smoke test
    - script: |
        echo "Smoke test: Frontend"
        curl -f http://localhost:3000
      displayName: Smoke Test - Frontend

# ============================
# STAGE 3 : TEST
# ============================
- stage: TEST
  displayName: CD - Test
  dependsOn: DEV
  condition: succeeded()

  jobs:
  - job: DeployTest
    displayName: Deploy to TEST
    pool:
      name: Default
      demands:
        - ENV -equals TEST

    steps:
    - script: echo "Deploying to TEST environment"
      displayName: TEST Deploy
